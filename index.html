<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria MM Fotografia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 48px 24px 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      color: #fff;
    }

    header p {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    #status {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 0.9rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 6px;
      padding: 0 6px 48px;
    }

    .gallery-item {
      aspect-ratio: 3/2;
      overflow: hidden;
      cursor: pointer;
      background: #222;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .gallery-item img.loaded {
      opacity: 1;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 2px;
    }

    #lightbox-close {
      position: fixed;
      top: 20px;
      right: 28px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
      background: none;
      border: none;
    }

    #lightbox-close:hover { opacity: 1; }

    #lightbox-prev,
    #lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.5;
      transition: opacity 0.2s;
      padding: 16px;
      user-select: none;
    }

    #lightbox-prev:hover,
    #lightbox-next:hover { opacity: 1; }

    #lightbox-prev { left: 8px; }
    #lightbox-next { right: 8px; }

    #lightbox-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #aaa;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #444;
      font-size: 0.8rem;
      border-top: 1px solid #222;
    }
  </style>
</head>
<body>

<header>
  <h1 id="gallery-name">MM Fotografia</h1>
  <p id="gallery-date"></p>
</header>

<div id="status">Carregando galeria...</div>
<div class="gallery" id="gallery"></div>

<div id="lightbox">
  <button id="lightbox-close">&#x2715;</button>
  <button id="lightbox-prev">&#8249;</button>
  <img id="lightbox-img" src="" alt="" />
  <button id="lightbox-next">&#8250;</button>
  <div id="lightbox-counter"></div>
</div>

<footer>MM Fotografia</footer>

<script>
  const API_KEY = 'AIzaSyAWszEv-IAHz-D10CFyGaHwmhcUnzjNG44';
  const params  = new URLSearchParams(window.location.search);
  const FOLDER_ID = params.get('id') || '1A7qGaUd2HbUU1beyRaVrX75Kk2gIriEO';

  let photos = [];
  let current = 0;

  async function loadGallery() {
    try {
      // Tenta ler info.txt da pasta
      await loadInfo();
      // Lista as imagens
      await loadPhotos();
    } catch (e) {
      document.getElementById('status').textContent = 'Erro ao carregar galeria. Verifique se a pasta está compartilhada publicamente.';
      console.error(e);
    }
  }

  async function loadInfo() {
    const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+name='info.txt'+and+trashed=false&fields=files(id,name)&key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      const fileId = data.files[0].id;
      const txtRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`);
      const txt = await txtRes.text();
      parseInfo(txt);
    }
  }

  function parseInfo(txt) {
    const lines = txt.split('\n');
    for (const line of lines) {
      const [key, ...rest] = line.split(':');
      const value = rest.join(':').trim();
      if (key.trim().toLowerCase() === 'nome') {
        document.getElementById('gallery-name').textContent = value;
        document.title = value + ' — MM Fotografia';
      }
      if (key.trim().toLowerCase() === 'data') {
        document.getElementById('gallery-date').textContent = value;
      }
    }
  }

  async function loadPhotos() {
    const mimeFilter = "mimeType contains 'image/'";
    const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+${encodeURIComponent(mimeFilter)}+and+trashed=false&fields=files(id,name)&pageSize=1000&key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!data.files || data.files.length === 0) {
      document.getElementById('status').textContent = 'Nenhuma foto encontrada nesta pasta.';
      return;
    }

    photos = data.files;
    document.getElementById('status').style.display = 'none';
    renderGallery();
  }

  function thumbUrl(id) {
    return `https://drive.google.com/thumbnail?id=${id}&sz=w600`;
  }

  function fullUrl(id) {
    return `https://drive.google.com/thumbnail?id=${id}&sz=w1600`;
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    photos.forEach((photo, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      const img = document.createElement('img');
      img.src = thumbUrl(photo.id);
      img.alt = photo.name;
      img.loading = 'lazy';
      img.onload = () => img.classList.add('loaded');
      item.appendChild(img);
      item.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(item);
    });
  }

  function openLightbox(index) {
    current = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    document.getElementById('lightbox-img').src = fullUrl(photos[current].id);
    document.getElementById('lightbox-counter').textContent = `${current + 1} / ${photos.length}`;
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-prev').addEventListener('click', () => {
    current = (current - 1 + photos.length) % photos.length;
    updateLightbox();
  });
  document.getElementById('lightbox-next').addEventListener('click', () => {
    current = (current + 1) % photos.length;
    updateLightbox();
  });

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'ArrowRight') { current = (current + 1) % photos.length; updateLightbox(); }
    if (e.key === 'ArrowLeft')  { current = (current - 1 + photos.length) % photos.length; updateLightbox(); }
    if (e.key === 'Escape') closeLightbox();
  });

  loadGallery();
</script>
</body>
</html>
