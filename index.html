<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria MM Fotografia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* CAPA */
    #hero {
      position: relative;
      width: 100%;
      height: 70vh;
      min-height: 380px;
      background: #1a1a1a center/cover no-repeat;
      display: flex;
      align-items: flex-end;
    }

    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.75) 100%);
    }

    #hero-content {
      position: relative;
      z-index: 1;
      padding: 40px 48px;
      width: 100%;
    }

    #hero-content h1 {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: normal;
      letter-spacing: 0.06em;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    #hero-content p {
      margin-top: 10px;
      font-size: 1rem;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.08em;
    }

    #photo-count {
      margin-top: 6px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
      font-family: sans-serif;
    }

    /* GALERIA */
    #status {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 0.9rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 6px;
      padding: 6px 6px 48px;
    }

    .gallery-item {
      aspect-ratio: 3/2;
      overflow: hidden;
      cursor: pointer;
      background: #222;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .gallery-item img.loaded { opacity: 1; }
    .gallery-item:hover img { transform: scale(1.04); }

    /* LIGHTBOX */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #lightbox.active { display: flex; }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
    }

    #lightbox-close {
      position: fixed;
      top: 20px;
      right: 28px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
      background: none;
      border: none;
    }

    #lightbox-close:hover { opacity: 1; }

    #lightbox-prev, #lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.5;
      transition: opacity 0.2s;
      padding: 16px;
      user-select: none;
    }

    #lightbox-prev:hover, #lightbox-next:hover { opacity: 1; }
    #lightbox-prev { left: 8px; }
    #lightbox-next { right: 8px; }

    #lightbox-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #aaa;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #444;
      font-size: 0.8rem;
      border-top: 1px solid #222;
    }
  </style>
</head>
<body>

<div id="hero">
  <div id="hero-content">
    <h1 id="gallery-name">MM Fotografia</h1>
    <p id="gallery-date"></p>
    <p id="photo-count"></p>
  </div>
</div>

<div id="status">Carregando galeria...</div>
<div class="gallery" id="gallery"></div>

<div id="lightbox">
  <button id="lightbox-close">&#x2715;</button>
  <button id="lightbox-prev">&#8249;</button>
  <img id="lightbox-img" src="" alt="" />
  <button id="lightbox-next">&#8250;</button>
  <div id="lightbox-counter"></div>
</div>

<footer>MM Fotografia</footer>

<script>
  const API_KEY   = 'AIzaSyAWszEv-IAHz-D10CFyGaHwmhcUnzjNG44';
  const params    = new URLSearchParams(window.location.search);
  const FOLDER_ID = params.get('id') || '1A7qGaUd2HbUU1beyRaVrX75Kk2gIriEO';

  let photos  = [];
  let current = 0;

  function thumbUrl(id) { return `https://drive.google.com/thumbnail?id=${id}&sz=w600`; }
  function fullUrl(id)  { return `https://drive.google.com/thumbnail?id=${id}&sz=w1600`; }

  async function loadGallery() {
    try {
      await loadInfo();
      await loadPhotos();
    } catch (e) {
      document.getElementById('status').textContent = 'Erro ao carregar galeria. Verifique se a pasta está compartilhada publicamente.';
      console.error(e);
    }
  }

  async function loadInfo() {
    const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+name='info.txt'+and+trashed=false&fields=files(id,name)&key=${API_KEY}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      const txtRes = await fetch(`https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media&key=${API_KEY}`);
      parseInfo(await txtRes.text());
    }
  }

  function parseInfo(txt) {
    for (const line of txt.split('\n')) {
      const [key, ...rest] = line.split(':');
      const value = rest.join(':').trim();
      const k = key.trim().toLowerCase();
      if (k === 'nome') {
        document.getElementById('gallery-name').textContent = value;
        document.title = value + ' — MM Fotografia';
      }
      if (k === 'data') {
        document.getElementById('gallery-date').textContent = value;
      }
    }
  }

  async function loadPhotos() {
    const mime = "mimeType+contains+'image/'";
    const url  = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+${mime}+and+trashed=false&fields=files(id,name)&pageSize=1000&key=${API_KEY}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (!data.files || data.files.length === 0) {
      document.getElementById('status').textContent = 'Nenhuma foto encontrada nesta pasta.';
      return;
    }

    photos = data.files;

    // Capa: procura arquivo chamado "capa.jpg/png", senão usa a primeira foto
    const capaFile = photos.find(f => f.name.toLowerCase().startsWith('capa.'));
    const capaId   = capaFile ? capaFile.id : photos[0].id;
    document.getElementById('hero').style.backgroundImage = `url('${fullUrl(capaId)}')`;

    // Fotos da galeria (exclui o arquivo de capa se existir)
    const galleryPhotos = capaFile ? photos.filter(f => f.id !== capaFile.id) : photos;
    document.getElementById('photo-count').textContent = `${galleryPhotos.length} fotos`;
    photos = galleryPhotos;

    document.getElementById('status').style.display = 'none';
    renderGallery();
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    photos.forEach((photo, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      const img = document.createElement('img');
      img.src = thumbUrl(photo.id);
      img.alt = photo.name;
      img.loading = 'lazy';
      img.onload = () => img.classList.add('loaded');
      item.appendChild(img);
      item.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(item);
    });
  }

  function openLightbox(index) {
    current = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    document.getElementById('lightbox-img').src = fullUrl(photos[current].id);
    document.getElementById('lightbox-counter').textContent = `${current + 1} / ${photos.length}`;
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-prev').addEventListener('click', () => { current = (current - 1 + photos.length) % photos.length; updateLightbox(); });
  document.getElementById('lightbox-next').addEventListener('click', () => { current = (current + 1) % photos.length; updateLightbox(); });
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'ArrowRight') { current = (current + 1) % photos.length; updateLightbox(); }
    if (e.key === 'ArrowLeft')  { current = (current - 1 + photos.length) % photos.length; updateLightbox(); }
    if (e.key === 'Escape') closeLightbox();
  });

  loadGallery();
</script>
</body>
</html>
